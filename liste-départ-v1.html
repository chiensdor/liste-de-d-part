<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {

}
header {

    th:nth-child(9), td:nth-child(9),
    th:nth-child(10), td:nth-child(10) { display: none; }
}
</style>

<body>

<header>FFSLC – Générateur de listes de départ (Version 2)</header>

<div class="container">
<!-- ============================

    <select id="modeCanitrail">

        <option value="3">Par 3</option>
        <option value="4">Par 4</option>
        <option value="20">Vagues de 20</option>

    <label>Heure de départ :</label>

<!-- PARAMÈTRES DYNAMIQUES -->
<div class="card">

</div>

<!-- BOUTONS D’ACTION -->
<div class="card">
    <h2>🛠️ Actions</h2>

    <button id="btnGenererListes" class="success">📝 Générer les listes de départ</button>

    <button id="btnExportPDFParDiscipline" class="primary"></button>
    <button id="btnExportPDFGlobal" class="primary">📄 Export PDF – toutes les listes</button>

    <button id="btnExporterTout" class="success">📦 Exporter tout</button>
</div>

<!-- TABLEAU -->
<div class="card">
    

    <p id="chipStats">0 inscrits fusionnés</p>

    <table id="tableResultat">
        <thead>
            <tr>
                <th>Licence</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Catégorie</th>
                <th>Club</th>
                <th>Chien</th>
                <th>Race</th>
                <th>Puce</th>
                <th>Moyenne</th>

                <th>Heure départ</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<!-- ============================
     PARTIE 3 — LOGIQUE JS
=============================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
/* ---------------------------------------------------------
   NETTOYAGE DES CLÉS
--------------------------------------------------------- */
function nettoyerCles(obj) {
    const propre = {};
    for (let cle in obj) {
        let c = cle
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/\s+/g, " ")
            .trim();
        propre[c] = obj[cle];
    }
    return propre;
}

/* ---------------------------------------------------------
   MAPPING TOLÉRANT
--------------------------------------------------------- */
function getCol(ligne, noms) {
    for (let n of noms) {
        if (ligne[n] !== undefined) return ligne[n];
    }
    return "";
}

/* ---------------------------------------------------------
   NORMALISATION DES DISCIPLINES
--------------------------------------------------------- */
function normaliserDiscipline(d) {
    if (!d) return "";
    d = d.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    d = d.replace(/\s+/g, "");

    const isSamedi = d.includes("samedi") || d.includes("sam");
    const isDimanche = d.includes("dimanche") || d.includes("dim");
    const suffix = isSamedi ? "_samedi" : isDimanche ? "_dimanche" : "";

    if (d.includes("canicrosscourt")) return "canicross_court" + suffix;
    if (d.includes("canicrosslong")) return "canicross_long" + suffix;
    if (d.includes("canicross")) return "canicross" + suffix;

    if (d.includes("vttcourt")) return "canivtt_court" + suffix;
    if (d.includes("vttlong")) return "canivtt_long" + suffix;
    if (d.includes("vtt")) return "canivtt" + suffix;

    if (d.includes("pedicyclecourt")) return "canipedicycle_court" + suffix;
    if (d.includes("pedicyclelong")) return "canipedicycle_long" + suffix;
    if (d.includes("pedi") || d.includes("cycle")) return "canipedicycle" + suffix;

    if (d.includes("trail")) return "canitrail" + suffix;

    return "";
}

/* ---------------------------------------------------------
   VARIABLES GLOBALES
--------------------------------------------------------- */
let inscrits = [];
let resultats = [];
let resultatsGlobaux = [];
let filteredView = [];
let listesFinales = {};
window.paramDepart = {};

let inscritsPrets = false;
let resultatsPrets = false;

/* ---------------------------------------------------------
   CHARGEMENT AUTOMATIQUE DES RÉSULTATS (GITHUB RAW)
--------------------------------------------------------- */
function chargerResultatsAuto() {
    const url = "https://raw.githubusercontent.com/chiensdor/liste-de-d-part/main/resultats_moyennes.csv";

    fetch(url)
        .then(res => res.text())
        .then(csv => {
            Papa.parse(csv, {
                header: true,
                skipEmptyLines: true,
                complete: data => {
                    resultats = data.data.map(l => ({
                        licence: getCol(l, ["Licence", "licence"]),
                        moyenne: getCol(l, ["moyenne", "Moyenne"]),
                        courses: getCol(l, ["nombre_courses", "courses"]),
                        participants: getCol(l, ["participants"]),
                        discipline: normaliserDiscipline(getCol(l, ["nom de la course", "Course"]))
                    }));

                    resultatsPrets = true;
                    if (inscritsPrets) fusionner();
                }
            });
        });
}
chargerResultatsAuto();

/* ---------------------------------------------------------
   LECTURE CSV / XLSX (INSCRITS)
--------------------------------------------------------- */
function lireFichier(input, callback) {
    const fichier = input.files[0];
    if (!fichier) return;

    const ext = fichier.name.split(".").pop().toLowerCase();

    if (ext === "csv") {
        Papa.parse(fichier, {
            header: true,
            skipEmptyLines: true,
            complete: res => callback(res.data.map(nettoyerCles))
        });
    } else {
        const reader = new FileReader();
        reader.onload = e => {
            const wb = XLSX.read(e.target.result, { type: "binary" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            callback(XLSX.utils.sheet_to_json(ws).map(nettoyerCles));
        };
        reader.readAsBinaryString(fichier);
    }
}

/* ---------------------------------------------------------
   FONCTION FUSIONNER
--------------------------------------------------------- */
function fusionner() {

    resultatsGlobaux = inscrits.map(i => {
        const r = resultats.find(x => x.licence == i.licence);
        return {
            ...i,
            moyenne: r ? r.moyenne : "",
            courses: r ? r.courses : "",
            participants: r ? r.participants : "",
            discipline: i.discipline || (r ? r.discipline : "")
        };
    });

    filteredView = [...resultatsGlobaux];
    afficherTableau();

    const disciplinesDetectees = [...new Set(resultatsGlobaux.map(r => r.discipline))];

    const disciplinesManquantes = [
        "canicross_court_dimanche",
        "canicross_long_samedi",
        "canitrail_dimanche"
    ];
    disciplinesManquantes.forEach(dm => {
        if (!disciplinesDetectees.includes(dm)) disciplinesDetectees.push(dm);
    });

    const zone = document.getElementById("zoneParametres");
    zone.innerHTML = "";
    window.paramDepart = {};

    const sansMode = [
        "canipedicycle_samedi",
        "canipedicycle_dimanche",
        "canivtt_samedi",
        "canivtt_dimanche"
    ];

    disciplinesDetectees.forEach(d => {
        const id = d.replace(/[^a-z0-9]/gi, "_");

        let html = `
            <div class="card" style="background:#f0f7ff; margin-top:15px;">
                <h3>${d.replaceAll("_", " ").toUpperCase()}</h3>

                <label>Heure de départ :</label>
                <input type="time" id="heure_${id}" value="09:00">
        `;

        if (!sansMode.includes(d)) {
            html += `
                <label>Type de départ :</label>
                <select id="mode_${id}">
                    <option value="1">Individuel</option>
                    <option value="2">Par 2</option>
                    <option value="3">Par 3</option>
                    <option value="4">Par 4</option>
                    <option value="20">Vagues de 20</option>
                    <option value="40">Vagues de 40</option>
                    <option value="30s">Individuel 30s (VTT / Pédicycle)</option>
                </select>
            `;
        }

        html += `</div>`;
        zone.innerHTML += html;

        paramDepart[d] = { heure: "09:00", mode: sansMode.includes(d) ? "30s" : "1" };
    });

    alert("Fusion terminée !");
}

/* ---------------------------------------------------------
   CHARGEMENT INSCRITS + FUSION AUTOMATIQUE
--------------------------------------------------------- */
document.getElementById("fichierInscrits").addEventListener("change", () => {
    lireFichier(document.getElementById("fichierInscrits"), data => {

        data = data.slice(1); // suppression première ligne

        inscrits = data.map(l => ({
            licence: getCol(l, ["Licence", "LICENCE"]),
            nom: getCol(l, ["Nom", "Nom de famille"]),
            prenom: getCol(l, ["Prénom", "Prenom"]),
            categorie: getCol(l, ["Catégorie", "Categorie"]),
            club: getCol(l, ["Club"]),
            chien: getCol(l, ["Chien", "#1 Chien - nom"]),
            race: getCol(l, ["Race", "#1 Chien - race"]),
            puce: getCol(l, ["Puce", "#1 Chien - puce"]),
            dossard: getCol(l, ["Dossard", "dossard", "Numéro", "Numero", "N°", "Dossard coureur"]),
            discipline: normaliserDiscipline(getCol(l, ["Course", "nom de la course"]))
        }));

        inscritsPrets = true;

        if (resultatsPrets) fusionner();
    });
});

/* ---------------------------------------------------------
   AFFICHAGE TABLEAU
--------------------------------------------------------- */
function afficherTableau() {
    const tbody = document.querySelector("#tableResultat tbody");
    tbody.innerHTML = "";

    filteredView.forEach(l => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${l.licence}</td>
            <td>${l.nom}</td>
            <td>${l.prenom}</td>
            <td>${l.categorie}</td>
            <td>${l.club}</td>
            <td>${l.chien}</td>
            <td>${l.race}</td>
            <td>${l.puce}</td>
            <td>${l.dossard || ""}</td>
            <td>${l.moyenne}</td>
            <td>${l.discipline}</td>
            <td>${l.heure_depart || ""}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById("chipStats").textContent =
        filteredView.length + " inscrits fusionnés";
}
</script>
<!-- ============================
     PARTIE 4 — GÉNÉRATION + EXPORTS + PDF + RESET
=============================== -->

<script>
/* ---------------------------------------------------------
   MISE À JOUR DES PARAMÈTRES AVANT GÉNÉRATION
--------------------------------------------------------- */
function mettreAJourParametres() {
    for (let d in paramDepart) {
        const id = d.replace(/[^a-z0-9]/gi, "_");

        const heureInput = document.getElementById("heure_" + id);
        const modeInput = document.getElementById("mode_" + id);

        if (heureInput) paramDepart[d].heure = heureInput.value;
        if (modeInput) paramDepart[d].mode = modeInput.value;
    }
}

/* ---------------------------------------------------------
   TRI PAR MOYENNE
--------------------------------------------------------- */
function trierParMoyenne(liste) {
    return liste.sort((a, b) => {
        const ma = Number(a.moyenne) || 0;
        const mb = Number(b.moyenne) || 0;

        if (ma === 0 && mb !== 0) return 1;
        if (mb === 0 && ma !== 0) return -1;

        return ma - mb;
    });
}

/* ---------------------------------------------------------
   CALCUL HEURES — GROUPES
--------------------------------------------------------- */
function genererGroupes(liste, heureDepart, tailleGroupe, intervalleSec) {
    let [h, m] = heureDepart.split(":").map(Number);
    let base = new Date();
    base.setHours(h, m, 0, 0);

    return liste.map((item, index) => {
        let groupe = Math.floor(index / tailleGroupe);
        let depart = new Date(base.getTime() + groupe * intervalleSec * 1000);

        let hh = String(depart.getHours()).padStart(2, "0");
        let mm = String(depart.getMinutes()).padStart(2, "0");
        let ss = String(depart.getSeconds()).padStart(2, "0");

        return { ...item, heure_depart: `${hh}:${mm}:${ss}` };
    });
}

/* ---------------------------------------------------------
   CALCUL HEURES — VAGUES
--------------------------------------------------------- */
function genererVagues(liste, heureDepart, tailleVague) {
    let [h, m] = heureDepart.split(":").map(Number);
    let base = new Date();
    base.setHours(h, m, 0, 0);

    return liste.map((item, index) => {
        let vague = Math.floor(index / tailleVague);
        let depart = new Date(base.getTime() + vague * 60 * 1000);

        let hh = String(depart.getHours()).padStart(2, "0");
        let mm = String(depart.getMinutes()).padStart(2, "0");

        return { ...item, heure_depart: `${hh}:${mm}:00` };
    });
}

/* ---------------------------------------------------------
   CALCUL HEURES — INDIVIDUEL 30s
--------------------------------------------------------- */
function genererIndividuel30s(liste, heureDepart) {
    let [h, m] = heureDepart.split(":").map(Number);
    let base = new Date();
    base.setHours(h, m, 0, 0);

    return liste.map((item, index) => {
        let depart = new Date(base.getTime() + index * 30 * 1000);

        let hh = String(depart.getHours()).padStart(2, "0");
        let mm = String(depart.getMinutes()).padStart(2, "0");
        let ss = String(depart.getSeconds()).padStart(2, "0");

        return { ...item, heure_depart: `${hh}:${mm}:${ss}` };
    });
}

/* ---------------------------------------------------------
   GÉNÉRATION DES LISTES DE DÉPART
--------------------------------------------------------- */
document.getElementById("btnGenererListes").addEventListener("click", () => {

    mettreAJourParametres(); // 🔥 essentiel

    const disciplines = Object.keys(paramDepart);
    listesFinales = {};

    disciplines.forEach(d => {
        const liste = resultatsGlobaux.filter(r => r.discipline === d);
        trierParMoyenne(liste);

        const heure = paramDepart[d].heure;
        const mode = paramDepart[d].mode;

        if (mode === "30s") {
            listesFinales[d] = genererIndividuel30s(liste, heure);
        } else if (mode == 20 || mode == 40) {
            listesFinales[d] = genererVagues(liste, heure, Number(mode));
        } else {
            const intervalle = d.includes("trail")
                ? Number(document.getElementById("intervalleCanitrail").value)
                : Number(document.getElementById("intervalleCanicross").value);

            listesFinales[d] = genererGroupes(liste, heure, Number(mode), intervalle);
        }
    });

    resultatsGlobaux = Object.values(listesFinales).flat();
    filteredView = [...resultatsGlobaux];
    afficherTableau();

    alert("Listes générées !");
});

/* ---------------------------------------------------------
   EXPORT CSV
--------------------------------------------------------- */
function exporterCSV(data, nomFichier) {
    if (!data || data.length === 0) return;
    const csv = Papa.unparse(data);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = nomFichier;
    a.click();
    URL.revokeObjectURL(url);
}

/* ---------------------------------------------------------
   EXPORT EXCEL SIMPLE
--------------------------------------------------------- */
function exporterExcel(data, nomFichier) {
    if (!data || data.length === 0) return;

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Départs");

    XLSX.writeFile(wb, nomFichier);
}

/* ---------------------------------------------------------
   EXPORT EXCEL MULTI‑ONGLETS
--------------------------------------------------------- */
document.getElementById("btnExportExcelMulti").addEventListener("click", () => {
    if (!listesFinales || Object.keys(listesFinales).length === 0) {
        alert("Génère d’abord les listes de départ.");
        return;
    }

    const wb = XLSX.utils.book_new();

    for (let nom in listesFinales) {
        const ws = XLSX.utils.json_to_sheet(listesFinales[nom]);
        XLSX.utils.book_append_sheet(wb, ws, nom.substring(0, 31));
    }

    XLSX.writeFile(wb, "depart_multi_onglets.xlsx");
});

/* ---------------------------------------------------------
   EXPORTER TOUT
--------------------------------------------------------- */
document.getElementById("btnExporterTout").addEventListener("click", () => {
    if (!listesFinales || Object.keys(listesFinales).length === 0) {
        alert("Génère d’abord les listes de départ.");
        return;
    }

    for (let d in listesFinales) {
        exporterCSV(listesFinales[d], `depart_${d}.csv`);
        exporterExcel(listesFinales[d], `depart_${d}.xlsx`);
    }

    exporterExcel(resultatsGlobaux, "depart_global.xlsx");

    alert("Tous les fichiers ont été exportés.");
});

/* ---------------------------------------------------------
   EXPORT PDF PAR DISCIPLINE
--------------------------------------------------------- */
document.getElementById("btnExportPDFParDiscipline").addEventListener("click", () => {

    if (!listesFinales || Object.keys(listesFinales).length === 0) {
        alert("Génère d’abord les listes de départ.");
        return;
    }

    const disciplines = Object.keys(listesFinales);
    let index = 0;

    function imprimerDiscipline() {
        if (index >= disciplines.length) {
            alert("Export PDF terminé.");
            return;
        }

        const d = disciplines[index];
        const data = listesFinales[d];

        const w = window.open("", "_blank");

        let html = `
            <html>
            <head>
                <title>${d}</title>
                <style>
                    body { font-family: Arial; padding: 20px; }
                    h1 { text-align: center; margin-bottom: 20px; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { border: 1px solid #000; padding: 6px; font-size: 12px; }
                </style>
            </head>
            <body>
                <h1>${d.replaceAll("_", " ").toUpperCase()}</h1>
                <table>
                    <thead>
                        <tr>
                            <th>Dossard</th>
                            <th>Licence</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Catégorie</th>
                            <th>Club</th>
                            <th>Chien</th>
                            <th>Race</th>
                            <th>Puce</th>
                            <th>Heure départ</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        data.forEach(l => {
            html += `
                <tr>
                    <td>${l.dossard || ""}</td>
                    <td>${l.licence}</td>
                    <td>${l.nom}</td>
                    <td>${l.prenom}</td>
                    <td>${l.categorie}</td>
                    <td>${l.club}</td>
                    <td>${l.chien}</td>
                    <td>${l.race}</td>
                    <td>${l.puce}</td>
                    <td>${l.heure_depart || ""}</td>
                </tr>
            `;
        });

        html += `
                    </tbody>
                </table>
            </body>
            </html>
        `;

        w.document.write(html);
        w.document.close();

        w.onload = () => {
            w.focus();
            w.print();

            const timer = setInterval(() => {
                if (w.closed) {
                    clearInterval(timer);
                    index++;
                    imprimerDiscipline();
                }
            }, 300);
        };
    }

    imprimerDiscipline();
});

/* ---------------------------------------------------------
   EXPORT PDF GLOBAL
--------------------------------------------------------- */
document.getElementById("btnExportPDFGlobal").addEventListener("click", () => {

    if (!listesFinales || Object.keys(listesFinales).length === 0) {
        alert("Génère d’abord les listes de départ.");
        return;
    }

    const disciplines = Object.keys(listesFinales);

    const w = window.open("", "_blank");

    let html = `
        <html>
        <head>
            <title>Listes de départ – PDF global</title>
            <style>
                body { font-family: Arial; padding: 20px; }
                h1 { text-align: center; margin-bottom: 20px; }
                h2 { margin-top: 20px; text-align: center; }
                table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                th, td { border: 1px solid #000; padding: 6px; font-size: 12px; }
                .page-break { page-break-before: always; }
            </style>
        </head>
        <body>
            <h1>LISTES DE DÉPART – PDF GLOBAL</h1>
    `;

    disciplines.forEach((d, index) => {
        const data = listesFinales[d];

        html += `
            <div class="${index > 0 ? 'page-break' : ''}">
                <h2>${d.replaceAll("_", " ").toUpperCase()}</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Dossard</th>
                            <th>Licence</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Catégorie</th>
                            <th>Club</th>
                            <th>Chien</th>
                            <th>Race</th>
                            <th>Puce</th>
                            <th>Heure départ</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        data.forEach(l => {
            html += `
                <tr>
                    <td>${l.dossard || ""}</td>
                    <td>${l.licence}</td>
                    <td>${l.nom}</td>
                    <td>${l.prenom}</td>
                    <td>${l.categorie}</td>
                    <td>${l.club}</td>
                    <td>${l.chien}</td>
                    <td>${l.race}</td>
                    <td>${l.puce}</td>
                    <td>${l.heure_depart || ""}</td>
                </tr>
            `;
        });

        html += `
                    </tbody>
                </table>
            </div>
        `;
    });

    html += `
        </body>
        </html>
    `;

    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 300);
});
